evaluation:
  data_path: /home/wangmeiyi/AuctionNet/medical/重构之后的代码/data/v3/test_Phys45_v3.pickle
  methods:
  - random_rollout
  - step0_rollout
  - teacher_forcing
  - saps2_head
  - sigma_gate
  use_semantic: true
model:
  name: bc
  policy:
    action_dim: 25
    hidden_dim: 256
    num_layers: 3
    semantic_embed: null
    state_dim: 45
    type: BC
  type: baseline
  world_model:
    action_dim: 25
    hidden_dim: 256
    num_layers: 3
    output_heads:
    - mu
    - sigma
    - saps2
    semantic_embed: null
    state_dim: 45
    type: BC_World
training:
  stage1:
    batch_size: 64
    data_path: /home/wangmeiyi/AuctionNet/medical/重构之后的代码/data/v3/train_Phys45_v3.pickle
    epochs: 100
    learning_rate: 0.0001
    low_oversample: 1
    stratified_sampling: true
  stage2:
    batch_size: 32
    enabled: true
    epochs: 50
    learning_rate: 5.0e-05
    selfplay_iterations: 1000
    # Confidence-gated semi-bootstrap parameters (aligned with Scheme3)
    sigma_threshold: 1.0        # MC Dropout uncertainty threshold (lowered from 2.0)
    mc_samples: 10              # Number of MC Dropout samples
    alpha_min: 0.3              # Minimum alpha for semi-bootstrap
    alpha_decay_steps: 50000    # Steps for alpha decay from 1.0 to alpha_min
    confidence_gate: 0.5        # Minimum confidence to enable bootstrap
    lambda_O: 0.5               # World model loss weight
    search_radius: 2            # Action search neighborhood radius
