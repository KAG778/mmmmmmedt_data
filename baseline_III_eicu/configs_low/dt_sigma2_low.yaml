evaluation:
  data_path: /home/wangmeiyi/AuctionNet/medical/last_exp/data/eicu_v3/test_Phys45_v3.pickle
  methods:
  - random_rollout
  - step0_rollout
  - teacher_forcing
  - saps2_head
  - sigma_gate
  use_semantic: true
model:
  name: dt_low
  policy:
    action_dim: 4
    context_length: 20
    n_embd: 128
    n_head: 8
    n_layer: 4
    semantic_embed: null
    state_dim: 45
    type: DT
  type: baseline
  world_model:
    action_dim: 4
    n_embd: 256
    n_head: 4
    n_layer: 3
    output_heads:
    - mu
    - sigma
    - saps2
    semantic_embed: null
    state_dim: 45
    type: DT_World
training:
  stage1:
    batch_size: 32
    data_path: /home/wangmeiyi/AuctionNet/medical/last_exp/data/eicu_v3/train_Phys45_v3.pickle
    epochs: 100
    learning_rate: 0.0005
    low_oversample: 1
    stratified_sampling: true
  stage2:
    batch_size: 16
    enabled: true
    epochs: 50
    learning_rate: 0.0002
    selfplay_iterations: 1000
    sigma_threshold: 2.0
    mc_samples: 10
    alpha_min: 0.3
    alpha_decay_steps: 50000
    confidence_gate: 0.5
    lambda_O: 0.5
    search_radius: 2
